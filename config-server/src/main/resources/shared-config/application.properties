# ===================================================================
# 1. CENTRALIZED ECOSYSTEM CONFIGURATIONS
# ===================================================================
# Directs all backend services to find the central Eureka Service Registry
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/

# ===================================================================
# 2. ACTUATOR & ADMINISTRATION ENDPOINTS
# ===================================================================
# Exposes critical metrics, health status, and tracing endpoints over HTTP
management.endpoints.web.exposure.include=health,info,metrics,tracing

# ===================================================================
# 3. ENTERPRISE DISTRIBUTED OBSERVABILITY (ZIPKIN & MICROMETER)
# ===================================================================
# Defines the central network endpoint where the Zipkin container collects data
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans

# Configures the tracing engine to sample 100% of network requests (1.0 = 100%)
management.tracing.sampling.probability=1.0

# ===================================================================
# 4. STRUCTURED APPLICATION CONSOLE LOGGING
# ===================================================================
# Appends distributed tracing identifiers right alongside log statements
# Pattern Format: [Service-Name, Trace-ID, Span-ID]
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
# Instructs OpenFeign clients to look for Resilience4j interceptors
feign.circuitbreaker.enabled=true

# Create an isolated circuit breaker instance named "ticketServiceCB"
# Trip the fuse if 50% or more of the requests fail
resilience4j.circuitbreaker.instances.ticketServiceCB.failureRateThreshold=50
# Wait at least 5 calls before calculating the percentage
resilience4j.circuitbreaker.instances.ticketServiceCB.minimumNumberOfCalls=5
# Stay in the OPEN state for 10 seconds (10000ms) before entering HALF-OPEN
resilience4j.circuitbreaker.instances.ticketServiceCB.waitDurationInOpenState=10000
# Send exactly 3 test requests when checking for service recovery
resilience4j.circuitbreaker.instances.ticketServiceCB.permittedNumberOfCallsInHalfOpenState=3
# ===================================================================
# 5. CENTRAL OAUTH2 / JWT SECURITY ENVIRONMENT
# ===================================================================
# The exact, immutable web address matching the 'iss' claim inside the token.
# Spring automatically appends /.well-known/openid-configuration to discover public verification keys.
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/master
# ===================================================================
# Global Apache Kafka Infrastructure Properties (Internal Docker Network)
# ===================================================================
spring.kafka.bootstrap-servers=kafka:9092

# Key and Value Deserializer/Serializer settings for JSON payloads
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust store packages configuration for security mapping
spring.kafka.consumer.properties.spring.json.trusted.packages=*