eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

# --- GATEWAY ROUTING CONFIGURATION ---

# Route 1: Forward /alarms/** paths directly to the alarm-processor microservice
spring.cloud.gateway.routes[0].id=alarm-route
spring.cloud.gateway.routes[0].uri=lb://ALARM-PROCESSOR
spring.cloud.gateway.routes[0].predicates[0]=Path=/alarms/**
# Optional: Strips the "/alarms" prefix if your alarm controller maps directly to "/"
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Route 2: Forward /tickets/** paths dynamically across TICKET-SERVICE instances
spring.cloud.gateway.routes[1].id=ticket-route
spring.cloud.gateway.routes[1].uri=lb://TICKET-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/tickets/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# 🚀 Route 3: Handle Telemetry Ingestion In-Gateway (No Load Balancing Needed)
spring.cloud.gateway.routes[2].id=telemetry-route
# Route to itself (localhost) because the TelemetryController lives inside the Gateway code!
spring.cloud.gateway.routes[2].uri=forward:///
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/telemetry/**