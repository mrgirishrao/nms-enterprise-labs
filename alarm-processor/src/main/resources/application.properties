server.port=8080
spring.application.name=alarm-processor
spring.config.import=configserver:http://config-server:8888
spring.kafka.consumer.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=nms-alarm-group
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.properties.spring.json.trusted.packages="com.telecom.nms.*"
# Setting a transaction prefix instantly enables Spring's KafkaTransactionManager
spring.kafka.producer.transaction-id-prefix=tx-alarm-proc-

# Enforce that messages must be replicated across brokers before confirming safe write
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true