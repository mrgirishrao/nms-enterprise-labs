server.port=0
spring.application.name=ticket-service
spring.config.import=configserver:http://config-server:8888
# Force the gateway to propagate tracing headers downstream to WebMvc apps
spring.cloud.gateway.observability.enabled=true
# 🛡️ ISOLATION GUARD
# Ensures this consumer only reads messages that belong to successfully committed transactions
spring.kafka.consumer.properties.isolation.level=read_committed